<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>The Explorer - Onboarding</title>

  <!-- Tailwind CSS (with plugins) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f6fafe",
            "secondary": "#48626e",
            "tertiary": "#602400",
            "surface-dim": "#d6dade",
            "on-primary-container": "#a5bdff",
            "surface-container": "#eaeef2",
            "surface-tint": "#2559bd",
            "surface": "#f6fafe",
            "on-primary-fixed-variant": "#00419e",
            "inverse-primary": "#b1c5ff",
            "tertiary-container": "#843500",
            "on-secondary-container": "#4e6874",
            "surface-container-highest": "#dfe3e7",
            "inverse-on-surface": "#edf1f5",
            "on-tertiary-fixed": "#341100",
            "on-background": "#171c1f",
            "on-primary-fixed": "#001946",
            "surface-variant": "#dfe3e7",
            "surface-container-low": "#f0f4f8",
            "inverse-surface": "#2c3134",
            "tertiary-fixed-dim": "#ffb692",
            "surface-bright": "#f6fafe",
            "secondary-container": "#cbe7f5",
            "tertiary-fixed": "#ffdbcb",
            "primary-fixed-dim": "#b1c5ff",
            "outline": "#737784",
            "on-surface-variant": "#434653",
            "primary-fixed": "#dae2ff",
            "on-secondary-fixed-variant": "#304a55",
            "secondary-fixed-dim": "#afcbd8",
            "primary-container": "#0047ab",
            "primary": "#00327d",
            "outline-variant": "#c3c6d5",
            "on-primary": "#ffffff",
            "secondary-fixed": "#cbe7f5",
            "surface-container-high": "#e4e9ed",
            "on-tertiary-container": "#ffaa80",
            "error-container": "#ffdad6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#171c1f",
            "on-tertiary": "#ffffff",
            "on-error": "#ffffff",
            "error": "#ba1a1a",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed-variant": "#7a3000",
            "on-error-container": "#93000a",
            "on-secondary-fixed": "#021f29"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>

  <!-- External stylesheet -->
  <link rel="stylesheet" href="onboarding_features_intro.css"/>
</head>

<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">

  <!-- ================================================================
       Top Navigation Bar (Onboarding Version: Minimal)
       ================================================================ -->
  <header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl">
    <div class="flex justify-between items-center px-6 py-6 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary" data-icon="travel_explore">travel_explore</span>
        <h1 class="text-xl font-extrabold text-blue-900 tracking-tighter font-headline">The Explorer</h1>
      </div>
      <button data-action="skip" class="text-on-surface-variant font-medium text-sm hover:text-primary transition-colors">Skip</button>
    </div>
  </header>

  <!-- ================================================================
       Main Content
       ================================================================ -->
  <main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 overflow-hidden">
    <div class="w-full max-w-lg mx-auto flex flex-col gap-12">

      <!-- Hero Visual Area (Asymmetrical Bento-style Layout) -->
      <div class="relative w-full aspect-[4/5] md:aspect-square flex items-center justify-center">

        <!-- Background Atmospheric Elements -->
        <div class="absolute -top-12 -right-12 w-64 h-64 bg-secondary-container/30 rounded-full blur-3xl -z-10"></div>
        <div class="absolute -bottom-12 -left-12 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>

        <!-- Central Editorial Image -->
        <div class="relative w-full h-full rounded-[2rem] overflow-hidden shadow-2xl rotate-2 group transition-transform hover:rotate-0 duration-500">
          <img
            alt="Person holding high-end smartphone with luxury travel background"
            class="w-full h-full object-cover"
            data-alt="Cinematic shot of a person using a premium mobile app in a sun-drenched airport lounge with soft bokeh and warm highlights"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWais9E6SbFsT4fMLU-TIxC69fbao1w4U-qAwh7ODqmDYaqFTTFlS9wSSOZ3wxfuleCp5hzkuMJzQZ4qbNa6uYXeeHUld66aihpvKO5BJzBS1hKV0btlRtHm8fG4EukGnnWkoCVXRW4CawSRAFFPOlMukZeD0iQJWXfQC-ALbfBURn-lf_LSpCD-vcu8pT837vZ2gB25fn6b42BjGx537JN263Zyr5OmDn3VF6nyG_EeROvjtRambIhGOhWorNXfjlmjXgGAHB2mV6"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
        </div>

        <!-- Floating Expense Card (Asymmetric Layering) -->
        <div class="absolute -bottom-4 -left-6 md:-left-12 w-64 glass-card p-6 rounded-[1.5rem] shadow-[0_12px_40px_rgba(23,28,31,0.06)] -rotate-3 border border-white/20">
          <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Daily Budget</span>
            <span class="text-primary font-bold">$450.00</span>
          </div>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px] text-on-secondary-container" data-icon="restaurant">restaurant</span>
              </div>
              <div class="flex-1">
                <div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
                  <div class="h-full bg-primary w-3/4"></div>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-tertiary-fixed flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px] text-on-tertiary-fixed-variant" data-icon="taxi_alert">taxi_alert</span>
              </div>
              <div class="flex-1">
                <div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
                  <div class="h-full bg-tertiary w-1/4"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="mt-4 pt-4 border-t border-outline-variant/15 flex justify-between">
            <span class="text-[10px] text-on-surface-variant">Remaining</span>
            <span class="text-xs font-bold text-on-surface">$124.50</span>
          </div>
        </div>

        <!-- Circular Detail Badge -->
        <div class="absolute top-10 -right-4 w-24 h-24 bg-tertiary-container flex flex-col items-center justify-center rounded-full text-on-tertiary shadow-xl rotate-12">
          <span class="text-xs font-headline font-bold">Safe to</span>
          <span class="text-lg font-headline font-extrabold tracking-tight">Spend</span>
        </div>

      </div><!-- /Hero Visual Area -->

      <!-- Content Area -->
      <div class="text-center space-y-6">
        <div class="space-y-3">
          <h2 class="text-4xl font-headline font-bold tracking-tight text-primary leading-tight">
            Track Expenses Effortlessly
          </h2>
          <p class="text-on-surface-variant font-body leading-relaxed text-lg max-w-sm mx-auto">
            Stay within budget while you focus on the journey. Real-time insights at your fingertips.
          </p>
        </div>

        <!-- Progress Indicator -->
        <div class="flex justify-center items-center gap-2 py-4">
          <div class="w-8 h-1.5 rounded-full bg-primary"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- ================================================================
       Footer Controls
       ================================================================ -->
  <footer class="w-full max-w-lg mx-auto px-6 pb-12 flex items-center justify-between mt-auto">
    <div class="text-on-surface-variant font-medium text-sm">
      Step 1 of 3
    </div>
    <button
      data-action="next"
      class="bg-editorial-gradient text-on-primary px-8 py-4 rounded-xl font-bold flex items-center gap-3 shadow-lg active:scale-95 transition-all duration-200 group"
    >
      <span>Next</span>
      <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
    </button>
  </footer>

  <!-- External JavaScript -->
  <script src="onboarding_features_intro.js"></script>

</body>
</html>
