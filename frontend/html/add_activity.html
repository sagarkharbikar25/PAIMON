<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config" src="add_activity.js"></script>
    <link rel="stylesheet" href="add_activity.css"/>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="bg-white/70 backdrop-blur-xl fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full">
        <div class="flex items-center gap-4">
            <button class="hover:bg-slate-100 transition-colors p-2 rounded-full active:scale-95 duration-200">
                <span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#00327d]">Add Activity</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden border-2 border-white shadow-sm">
                <img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling young man with light stubble in soft natural outdoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBt0uBDjIkt5YstOggmwfpQv82ZnDH1Zwz-MncMB_v4DMFqESBxsdOazT6sRIKnt9bxD19m_3R8hb3Cs4D_UpUb-tx3EumpfYIXfMBeszb05MAxWf5dXBfbsuTGjgj_p1QhmLK3ncVTvAA0xSbpge-Tp40q_pkai1KQE-OfeVo5kioARLiv7a5tlQ0gZkNZWjCDPeoP70AX0gLlBrQ2kprbmdjGKpgiLMetdRT-Y1HFPfNCzZVSi6sjH6M7nfFTnwzd-PetPSZMF5ZV"/>
            </div>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto">
        <!-- Hero Visual Section -->
        <section class="mb-10">
            <div class="relative h-48 w-full rounded-xl overflow-hidden shadow-sm group">
                <img alt="Travel Scene" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="Serene tropical beach at sunset with calm turquoise water and soft orange glow on the horizon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfnOrT3vMpjyA-UotMb8_WlY0noz_dstOaGDoBR0mLJk7KFXTE2M98Ec93fmuF_IvouJe5HOFs6hs0f3I5V1MqB20X4vMiUahw5ex6JiSLR5GAEVaHUG0RN4MBfUGVOLI-foNGxMIdqDsAIpcQ7kVv_mbZEqFaGpTuWw_0ndyjPwlaW-MVKvjL3IC8NTDdSed8Lu_92KjJtIO4ia6Sa9TTl0pb0taVFLE32i4-pHKOr1kzwxg9jdLRyXTPWshLgdU5CUgOzDt7EomJ"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
                    <p class="text-white font-headline font-bold text-xl tracking-wide">Where is your next stop?</p>
                </div>
            </div>
        </section>

        <!-- Form Section -->
        <form class="space-y-8">
            <!-- Activity Name -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Activity Name</label>
                <input class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 shadow-sm" placeholder="e.g., Sunset Dinner at the Pier" type="text"/>
            </div>

            <!-- Category Picker (Horizontal Scroll) -->
            <div class="space-y-3">
                <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Category</label>
                <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                    <button class="flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-full bg-primary text-on-primary shadow-md active:scale-95 transition-all category-btn active" type="button">
                        <span class="material-symbols-outlined text-[20px]">restaurant</span>
                        <span class="text-sm font-medium">Food</span>
                    </button>
                    <button class="flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-full bg-white text-on-surface-variant border border-outline-variant/30 hover:bg-surface-container-low transition-all category-btn" type="button">
                        <span class="material-symbols-outlined text-[20px]">camera_roll</span>
                        <span class="text-sm font-medium">Sightseeing</span>
                    </button>
                    <button class="flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-full bg-white text-on-surface-variant border border-outline-variant/30 hover:bg-surface-container-low transition-all category-btn" type="button">
                        <span class="material-symbols-outlined text-[20px]">directions_walk</span>
                        <span class="text-sm font-medium">Outdoors</span>
                    </button>
                    <button class="flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-full bg-white text-on-surface-variant border border-outline-variant/30 hover:bg-surface-container-low transition-all category-btn" type="button">
                        <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
                        <span class="text-sm font-medium">Shopping</span>
                    </button>
                </div>
            </div>

            <!-- Date & Time Grid -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Date</label>
                    <div class="relative">
                        <input class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-sm" type="date"/>
                        <span class="material-symbols-outlined absolute right-4 top-4 text-outline pointer-events-none">calendar_today</span>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Time</label>
                    <div class="relative">
                        <input class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-sm" type="time"/>
                        <span class="material-symbols-outlined absolute right-4 top-4 text-outline pointer-events-none">schedule</span>
                    </div>
                </div>
            </div>

            <!-- Location Search -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Location</label>
                <div class="relative">
                    <input class="w-full bg-surface-container-high border-none rounded-lg pl-12 pr-5 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-sm" placeholder="Search for a place or address..." type="text"/>
                    <span class="material-symbols-outlined absolute left-4 top-4 text-primary">location_on</span>
                </div>
                <!-- Mini Map Mockup -->
                <div class="mt-3 h-32 w-full rounded-xl bg-surface-container overflow-hidden relative">
                    <img alt="Map Preview" class="w-full h-full object-cover opacity-60" data-alt="Clean minimalist digital map interface showing city streets and a blue navigation pin marker" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKq-hIMPT1Toe99qH_gecpdS_b-N9EtBTxWeawNZHZUbVxPtj_24OXaYOBXyVt9cuM4MIzgmQUIAJlDqhh9malUPEUy7S8JGqq0IwVc5QnO7IbLIMfpgvx_OOHaWWHC_uQpFxgiNTCAFkFAMz_moU1unHiG9Dil3S0repObswephX6igY0EbeAN1AYwELIvcm1_Utof4i5ORXhxcUy14qq7qnySynfoGaUxQzR4tgCZLrGZQIVCB2_NwbBF00nWvYxMp7F9bpvqt2i"/>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-white p-2 rounded-full shadow-lg">
                            <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Notes</label>
                <textarea class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-sm resize-none" placeholder="Any special requirements, reservation numbers, or things to remember..." rows="4"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-4 pt-4">
                <button class="flex-1 px-6 py-4 rounded-xl bg-surface-container-highest text-on-surface font-semibold hover:bg-surface-dim transition-colors active:scale-95" type="button" id="discard-btn">
                    Discard
                </button>
                <button class="flex-[2] px-6 py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all active:scale-95" type="submit" id="save-btn">
                    Save Activity
                </button>
            </div>
        </form>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl z-50 rounded-t-[2rem] border-t border-[#c3c6d5]/15 shadow-[0_-12px_40px_rgba(23,28,31,0.06)]">
        <a class="flex flex-col items-center justify-center text-[#00327d] bg-[#0047AB]/10 rounded-2xl px-5 py-2 active:scale-90 transition-transform duration-200 nav-link active" href="#">
            <span class="material-symbols-outlined" data-icon="event_note" style="font-variation-settings: 'FILL' 1;">event_note</span>
            <span class="font-['Inter'] text-[10px] font-medium tracking-wide">Itinerary</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-[#00327d] transition-colors nav-link" href="#">
            <span class="material-symbols-outlined" data-icon="payments">payments</span>
            <span class="font-['Inter'] text-[10px] font-medium tracking-wide">Expenses</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-[#00327d] transition-colors nav-link" href="#">
            <span class="material-symbols-outlined" data-icon="confirmation_number">confirmation_number</span>
            <span class="font-['Inter'] text-[10px] font-medium tracking-wide">Tickets</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-[#00327d] transition-colors nav-link" href="#">
            <span class="material-symbols-outlined" data-icon="explore">explore</span>
            <span class="font-['Inter'] text-[10px] font-medium tracking-wide">Explore</span>
        </a>
    </nav>

    <!-- Aesthetic Floating Decoration -->
    <div class="fixed top-1/4 -right-12 w-24 h-24 bg-primary/5 rounded-full blur-3xl -z-10"></div>
    <div class="fixed bottom-1/4 -left-12 w-32 h-32 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>

    <script src="add_activity.js"></script>
</body>
</html>
