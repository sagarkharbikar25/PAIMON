<head>

    <!-- ✅ Step 2: CDN reads config above -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/expense_tracker.css"/>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">

    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full overflow-hidden" style="background:#dae2ff;">
                <img id="profile-avatar" alt="Profile" class="w-full h-full object-cover"
                     src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeFPN9YmGwVqgxHBWIlD3PejYUizBcmvS5lMB7XfKfliEvvFv-aMzSOqDnOiweI4FZGD1JX_FwDyJEiXtncOVbz9P3uWwd7hcu-Torz3ebzKszVcB1myp2KoElc7b1uBnnseDoMWzCSRfVi1vXQzNHJwTru-e6C3whur4rHAKCd0QWIabhV2-mwSp3HZYWzdLw70fAjUpFvuHJxmxdKgxQmbeffFzzHxj0PMzL3_y5LWUf272DYXhO9_dK1zNGnkVTNYsZga1t5vR0"/>
            </div>
            <span class="text-xl font-bold text-[#00327d] tracking-tight font-headline">The Explorer</span>
        </div>
        <button id="notification-btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200">
            <span class="material-symbols-outlined text-[#00327d]">notifications</span>
        </button>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">

        <!-- Budget Status Card -->
        <section class="relative bg-white p-8 rounded-[2rem] shadow-[0_12px_40px_rgba(23,28,31,0.06)] overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <span class="material-symbols-outlined text-8xl">account_balance_wallet</span>
            </div>
            <div class="relative z-10">
                <p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase mb-2">Trip Budget Status</p>
                <div class="flex items-baseline gap-2 mb-6">
                    <h2 class="text-4xl font-extrabold text-primary tracking-tighter" id="budget-percentage">—</h2>
                    <span class="text-on-surface-variant">consumed</span>
                </div>
                <div class="h-4 w-full rounded-full overflow-hidden mb-8" style="background:#eaeef2;">
                    <div id="progress-bar" class="h-full rounded-full" style="width:0%;background:linear-gradient(to right,#00327d,#0047ab);transition:width 1s ease-out;"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 rounded-xl" style="background:#f0f4f8;">
                        <p class="text-on-surface-variant text-xs mb-1">Spent</p>
                        <p class="text-lg font-bold text-on-surface" id="spent-amount">—</p>
                    </div>
                    <div class="p-4 rounded-xl border-l-4" style="background:#f0f4f8;border-color:#602400;">
                        <p class="text-on-surface-variant text-xs mb-1">Remaining</p>
                        <p class="text-lg font-bold" style="color:#602400;" id="remaining-amount">—</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Balance Cards — fully inline styled -->
        <section class="grid grid-cols-2 gap-4">
            <div id="owed-card" style="background:#cbe7f5;padding:1.5rem;border-radius:1.5rem;display:flex;flex-direction:column;justify-content:space-between;min-height:160px;cursor:pointer;">
                <div style="width:2.5rem;height:2.5rem;background:rgba(255,255,255,0.5);border-radius:9999px;display:flex;align-items:center;justify-content:center;">
                    <span class="material-symbols-outlined" style="color:#021f29;">call_made</span>
                </div>
                <div>
                    <p style="color:#4e6874;font-size:0.875rem;font-family:'Inter',sans-serif;font-weight:500;margin-bottom:4px;">You are owed</p>
                    <p id="owed-amount" style="font-size:1.5rem;font-weight:700;color:#021f29;font-family:'Plus Jakarta Sans',sans-serif;">—</p>
                </div>
            </div>
            <div id="owe-card" style="background:#ffdbcb;padding:1.5rem;border-radius:1.5rem;display:flex;flex-direction:column;justify-content:space-between;min-height:160px;cursor:pointer;">
                <div style="width:2.5rem;height:2.5rem;background:rgba(255,255,255,0.5);border-radius:9999px;display:flex;align-items:center;justify-content:center;">
                    <span class="material-symbols-outlined" style="color:#341100;">call_received</span>
                </div>
                <div>
                    <p style="color:#7a3000;font-size:0.875rem;font-family:'Inter',sans-serif;font-weight:500;margin-bottom:4px;">You owe</p>
                    <p id="owe-amount" style="font-size:1.5rem;font-weight:700;color:#341100;font-family:'Plus Jakarta Sans',sans-serif;">—</p>
                </div>
            </div>
        </section>

        <!-- Recent Activity — empty, filled by JS -->
        <section class="space-y-4">
            <div class="flex justify-between items-end px-2">
                <h3 class="text-xl font-bold text-on-surface">Recent Activity</h3>
                <button id="see-all-btn" class="text-primary font-bold text-sm hover:underline">See all</button>
            </div>
            <div class="space-y-3" id="activity-list">
                <!-- skeleton placeholders -->
                <div class="p-5 rounded-2xl animate-pulse flex items-center gap-4" style="background:#fff;">
                    <div class="w-12 h-12 rounded-xl shrink-0" style="background:#eaeef2;"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 rounded" style="background:#eaeef2;width:50%;"></div>
                        <div class="h-3 rounded" style="background:#eaeef2;width:33%;"></div>
                    </div>
                    <div class="h-4 rounded" style="background:#eaeef2;width:4rem;"></div>
                </div>
                <div class="p-5 rounded-2xl animate-pulse flex items-center gap-4" style="background:#fff;">
                    <div class="w-12 h-12 rounded-xl shrink-0" style="background:#eaeef2;"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 rounded" style="background:#eaeef2;width:66%;"></div>
                        <div class="h-3 rounded" style="background:#eaeef2;width:25%;"></div>
                    </div>
                    <div class="h-4 rounded" style="background:#eaeef2;width:4rem;"></div>
                </div>
                <div class="p-5 rounded-2xl animate-pulse flex items-center gap-4" style="background:#fff;">
                    <div class="w-12 h-12 rounded-xl shrink-0" style="background:#eaeef2;"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 rounded" style="background:#eaeef2;width:55%;"></div>
                        <div class="h-3 rounded" style="background:#eaeef2;width:40%;"></div>
                    </div>
                    <div class="h-4 rounded" style="background:#eaeef2;width:4rem;"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl z-50 rounded-t-[2rem] shadow-[0_-12px_40px_rgba(23,28,31,0.06)]" style="border-top:1px solid rgba(195,198,213,0.15);">
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 active:scale-90 transition-transform duration-200 bottom-nav-link" data-nav="itinerary" href="#">
            <span class="material-symbols-outlined mb-1">event_note</span>
            <span style="font-size:10px;font-family:'Inter',sans-serif;font-weight:500;">Itinerary</span>
        </a>
        <a class="flex flex-col items-center justify-center rounded-2xl px-5 py-2 active:scale-90 transition-transform duration-200 bottom-nav-link" data-nav="expenses" href="#" style="color:#00327d;background:rgba(0,71,171,0.1);">
            <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1;">payments</span>
            <span style="font-size:10px;font-family:'Inter',sans-serif;font-weight:500;">Expenses</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 active:scale-90 transition-transform duration-200 bottom-nav-link" data-nav="tickets" href="#">
            <span class="material-symbols-outlined mb-1">confirmation_number</span>
            <span style="font-size:10px;font-family:'Inter',sans-serif;font-weight:500;">Tickets</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 active:scale-90 transition-transform duration-200 bottom-nav-link" data-nav="explore" href="#">
            <span class="material-symbols-outlined mb-1">explore</span>
            <span style="font-size:10px;font-family:'Inter',sans-serif;font-weight:500;">Explore</span>
        </a>
    </nav>

    <!-- FAB -->
    <button id="fab-btn" class="fixed z-40 active:scale-95 transition-all flex items-center justify-center"
            style="bottom:7rem;right:1.5rem;width:4rem;height:4rem;background:linear-gradient(135deg,#843500,#602400);border-radius:1rem;box-shadow:0 8px 24px rgba(96,36,0,0.3);border:none;cursor:pointer;">
        <span class="material-symbols-outlined text-white text-3xl">add</span>
    </button>

    <!-- ✅ Step 3: JS logic loads here ONLY — DOM fully ready, no DOMContentLoaded race -->
    <script src="../js/expense_tracker.js"></script>

</body>
</html>
