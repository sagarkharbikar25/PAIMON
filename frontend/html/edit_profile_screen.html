<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Edit Profile - प्रvaas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config" src="edit_profile_screen.js"></script>
    <link rel="stylesheet" href="edit_profile_screen.css"/>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-32">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-[#f6fafe]/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full">
        <div class="flex items-center gap-4">
            <button class="material-symbols-outlined text-[#00327d] hover:bg-black/5 transition-colors p-2 rounded-full active:scale-95 duration-200 back-btn">arrow_back</button>
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-[#00327d] text-lg">Profile</h1>
        </div>
        <button class="material-symbols-outlined text-[#00327d] hover:bg-black/5 transition-colors p-2 rounded-full active:scale-95 duration-200 settings-btn">settings</button>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto">
        <!-- Profile Picture Section -->
        <section class="flex flex-col items-center mb-10">
            <div class="relative group">
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-lg" id="profile-image-container">
                    <img class="w-full h-full object-cover" id="profile-image" data-alt="portrait of a professional man with a friendly expression in soft natural lighting, high-end lifestyle photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtCEf4LZlsH1TXEW_HjmdszlJl12Kt-Dd_0M3qm1ublO1qpDDhbuBpAKS1Skukq-0gcPKb2TfbW2yJ8o887rGrrW5D5P9RMKb2LR-Utw-1BFDDUnL0KUWqLs5sY4pvBmOBW7S_jIvJUkbIomUPO0NeAHie-cy0ye3O9vO91x4Eylf1rX0P0H2XqCrjsNJOoY9gkV-PTg8gt-Dt0y4VaBOZvEOiTrwThTzQEiZAgDpA_hPqcmkKQyZRhU5b3Ruk6C19v-izMiTqfd2m"/>
                </div>
                <button class="absolute bottom-0 right-0 bg-primary text-on-primary p-2.5 rounded-full shadow-xl active:scale-90 transition-transform flex items-center justify-center" id="change-photo-btn">
                    <span class="material-symbols-outlined text-[20px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
                </button>
                <input type="file" id="photo-input" accept="image/*" class="hidden"/>
            </div>
            <div class="mt-4 text-center">
                <h2 class="text-xl font-bold tracking-tight text-primary" id="display-name">Alex Rivera</h2>
                <p class="text-on-surface-variant text-sm font-medium">Premium Member</p>
            </div>
        </section>

        <!-- Edit Form Card -->
        <div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_-12px_40px_rgba(23,28,31,0.06)] space-y-8">
            <form id="profile-form" class="space-y-6">
                <!-- Full Name Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1">Full Name</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">person</span>
                        </div>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_0_0_1px_rgba(195,198,213,0.5)] transition-all font-medium text-on-surface" id="full-name-input" type="text" value="Alex Rivera"/>
                    </div>
                </div>

                <!-- Email Address Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
                        </div>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_0_0_1px_rgba(195,198,213,0.5)] transition-all font-medium text-on-surface" id="email-input" type="email" value="alex.rivera@explorer.com"/>
                    </div>
                </div>

                <!-- Phone Number Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1">Phone Number</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">call</span>
                        </div>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_0_0_1px_rgba(195,198,213,0.5)] transition-all font-medium text-on-surface" id="phone-input" type="tel" value="+1 (555) 012-3456"/>
                    </div>
                </div>
            </form>

            <!-- Action Button -->
            <div class="pt-4">
                <button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 rounded-lg font-bold text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="update-profile-btn">
                    Update Profile
                    <span class="material-symbols-outlined text-[20px]">check_circle</span>
                </button>
                <p class="text-center text-on-surface-variant text-[11px] mt-4 font-medium italic">Changes will be reflected across all your booked journeys.</p>
            </div>
        </div>

        <!-- Secondary Account Options -->
        <div class="mt-8 space-y-4">
            <h3 class="px-2 text-sm font-bold text-on-surface-variant">Security &amp; Preferences</h3>
            <div class="bg-surface-container-low rounded-xl overflow-hidden">
                <button class="w-full flex items-center justify-between p-5 hover:bg-black/5 transition-colors border-b border-outline-variant/10" id="change-password-btn">
                    <div class="flex items-center gap-4">
                        <div class="bg-secondary-container p-2 rounded-lg">
                            <span class="material-symbols-outlined text-on-secondary-container">lock</span>
                        </div>
                        <span class="font-semibold text-on-surface">Change Password</span>
                    </div>
                    <span class="material-symbols-outlined text-outline">chevron_right</span>
                </button>
                <button class="w-full flex items-center justify-between p-5 hover:bg-black/5 transition-colors" id="notification-settings-btn">
                    <div class="flex items-center gap-4">
                        <div class="bg-secondary-container p-2 rounded-lg">
                            <span class="material-symbols-outlined text-on-secondary-container">notifications_active</span>
                        </div>
                        <span class="font-semibold text-on-surface">Notification Settings</span>
                    </div>
                    <span class="material-symbols-outlined text-outline">chevron_right</span>
                </button>
            </div>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-12px_40px_rgba(23,28,31,0.06)]">
        <div class="flex flex-col items-center justify-center text-[#434653] px-5 py-1.5 hover:opacity-80 transition-opacity bottom-nav-item" data-nav="explore">
            <span class="material-symbols-outlined">explore</span>
            <span class="font-['Inter'] text-[11px] font-medium tracking-wide">Explore</span>
        </div>
        <div class="flex flex-col items-center justify-center text-[#434653] px-5 py-1.5 hover:opacity-80 transition-opacity bottom-nav-item" data-nav="bookings">
            <span class="material-symbols-outlined">confirmation_number</span>
            <span class="font-['Inter'] text-[11px] font-medium tracking-wide">Bookings</span>
        </div>
        <div class="flex flex-col items-center justify-center text-[#434653] px-5 py-1.5 hover:opacity-80 transition-opacity bottom-nav-item" data-nav="saved">
            <span class="material-symbols-outlined">favorite</span>
            <span class="font-['Inter'] text-[11px] font-medium tracking-wide">Saved</span>
        </div>
        <div class="flex flex-col items-center justify-center text-[#00327d] bg-[#cbe7f5]/50 rounded-2xl px-5 py-1.5 hover:opacity-80 transition-opacity bottom-nav-item active" data-nav="profile">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="font-['Inter'] text-[11px] font-medium tracking-wide">Profile</span>
        </div>
    </nav>

    <script src="edit_profile_screen.js"></script>
</body>
</html>
