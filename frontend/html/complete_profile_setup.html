<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Complete Profile - Digital Concierge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="complete_profile_setup.css"/>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-24">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
            <button class="text-[#00327d] dark:text-[#0047ab] hover:opacity-80 transition-opacity active:scale-95 duration-200 back-btn">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="text-[#00327d] dark:text-[#0047ab] font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-lg">Complete Profile</h1>
            <div class="w-6"></div> <!-- Spacer for centering -->
        </div>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto">
        <!-- Hero Section / Context -->
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-extrabold text-primary tracking-tight mb-2">Build Your Identity</h2>
            <p class="text-on-surface-variant text-body-lg">Share your details to unlock a personalized concierge experience.</p>
        </div>

        <!-- Profile Image Upload -->
        <div class="relative w-32 h-32 mx-auto mb-12">
            <div class="w-full h-full rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest shadow-sm" id="profile-image-container">
                <span class="material-symbols-outlined text-surface-dim text-5xl" data-icon="person" id="profile-placeholder">person</span>
                <!-- Image simulation would go here -->
                <img alt="Profile" class="w-full h-full object-cover hidden" id="profile-image"/>
            </div>
            <button class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:opacity-90 active:scale-95 transition-all" id="edit-profile-btn">
                <span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
            </button>
            <input accept="image/*" class="hidden" id="profile-image-input" type="file"/>
        </div>

        <!-- Profile Form Card -->
        <div class="bg-surface-container-lowest rounded-xl p-8 mb-8">
            <form class="space-y-6" id="profile-form">
                <!-- Full Name -->
                <div class="space-y-2">
                    <label class="block text-label-md font-semibold text-on-surface-variant ml-1">Full Name</label>
                    <input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-outline/50" id="full-name-input" placeholder="Johnathan Doe" type="text"/>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Age -->
                    <div class="space-y-2">
                        <label class="block text-label-md font-semibold text-on-surface-variant ml-1">Age</label>
                        <input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-outline/50" id="age-input" placeholder="28" type="number"/>
                    </div>
                    <!-- Date of Birth -->
                    <div class="space-y-2">
                        <label class="block text-label-md font-semibold text-on-surface-variant ml-1">Date of Birth</label>
                        <div class="relative">
                            <input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface" id="dob-input" type="date"/>
                            <span class="material-symbols-outlined absolute right-4 top-4 text-outline pointer-events-none" data-icon="calendar_today">calendar_today</span>
                        </div>
                    </div>
                </div>

                <!-- Mobile Number -->
                <div class="space-y-2">
                    <label class="block text-label-md font-semibold text-on-surface-variant ml-1">Mobile Number</label>
                    <div class="flex gap-3">
                        <div class="w-24 h-14 bg-surface-container-low rounded-lg flex items-center justify-center text-on-surface font-medium border-none" id="country-code">
                            +1
                        </div>
                        <input class="flex-1 h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-outline/50" id="mobile-input" placeholder="(555) 000-0000" type="tel"/>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Country -->
                    <div class="space-y-2">
                        <label class="block text-label-md font-semibold text-on-surface-variant ml-1">Country</label>
                        <select class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface appearance-none" id="country-select">
                            <option>United States</option>
                            <option>United Kingdom</option>
                            <option>Canada</option>
                            <option>Australia</option>
                        </select>
                    </div>
                    <!-- State -->
                    <div class="space-y-2">
                        <label class="block text-label-md font-semibold text-on-surface-variant ml-1">State / Region</label>
                        <input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-outline/50" id="state-input" placeholder="California" type="text"/>
                    </div>
                </div>
            </form>
        </div>

        <!-- Privacy Assurance -->
        <div class="flex items-center gap-3 px-4 mb-10">
            <div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-primary text-xl" data-icon="verified_user">verified_user</span>
            </div>
            <p class="text-sm text-on-secondary-container leading-tight">
                Your data is encrypted and used only to enhance your booking experience. We never share your details without consent.
            </p>
        </div>

        <!-- Action Section -->
        <div class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 bg-gradient-to-t from-background via-background to-transparent md:relative md:bg-none md:p-0">
            <button class="w-full max-w-2xl mx-auto h-16 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-primary/20 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="save-profile-btn">
                Save Profile
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
            </button>
        </div>
    </main>

    <!-- Bottom Navigation Suppressed as per "The Destination Rule" - this is a focused task-focused sub-page -->

    <script type="module" src="../js/complete_profile_setup.js"></script>
</body>
</html>
