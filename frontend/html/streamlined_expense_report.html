<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Expense Report - Digital Concierge</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config + JS Logic -->
  <script src="../js/streamlined_expense_report.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="../css/streamlined_expense_report.css"/>
</head>
<body class="bg-background font-body text-on-background min-h-screen pb-32">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden">
        <img alt="User Profile" class="w-full h-full object-cover"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCA_rMskVjPoNRf6sMcyB-SLjDUJmDH-FOKRvA8xVuD-owA7heBVzDZqAuCmAu-NJ47mvFSZyWcT6h1RNeTYJQDAzwvEnq7Ra49JltBZg_hAhcOlkKW88RYba-Fcu6VVZSUlpgnqr1L9gfCqBjGYl8zLPXcz3dwL3MGHcddRaPxEVpHgZ6nkj3SNYihhvHUHVFtz3_fUg3eVGp_yN-bEzeHYjVkvC3GtmihFDlArWD9-HaFmCY3ZIe2uSMyb6YmP4auEwybs4n7lZKk"/>
      </div>
      <!-- h1 updated by JS to show trip destination -->
      <h1 class="font-headline font-bold tracking-tight text-lg text-[#00327d] dark:text-[#0047ab]">Digital Concierge</h1>
    </div>
    <div class="flex items-center gap-4">
      <button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-[#00327d] dark:text-[#0047ab]">
        <span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
      </button>
    </div>
  </header>

  <main class="pt-24 px-6 max-w-4xl mx-auto space-y-8">

    <!-- ── Trip Budget Status Section ── -->
    <section class="relative group">
      <div class="absolute -inset-1 bg-gradient-to-r from-primary to-primary-container rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-1000 group-hover:duration-200"></div>
      <div class="relative bg-surface-container-lowest rounded-[2rem] p-8 shadow-[0_12px_40px_rgba(23,28,31,0.06)] overflow-hidden">
        <div class="flex justify-between items-start mb-6">
          <div>
            <h2 class="font-headline text-on-surface-variant font-semibold text-sm uppercase tracking-widest mb-1">Trip Budget Status</h2>
            <div class="flex items-baseline gap-2">
              <!-- Populated by JS -->
              <span id="budget-spent" class="font-headline text-4xl font-extrabold text-primary tracking-tight">₹0</span>
              <span id="budget-total" class="text-on-surface-variant font-medium">/ ₹60,000</span>
            </div>
          </div>
          <div id="budget-pct-badge" class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full text-xs font-bold tracking-wider">
            0% SPENT
          </div>
        </div>
        <!-- Progress bar — width set by JS -->
        <div class="w-full bg-surface-container-high h-4 rounded-full overflow-hidden mb-6">
          <div id="budget-bar" class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <div class="flex gap-6">
          <div class="flex-1 p-4 rounded-xl bg-surface-container-low border border-outline-variant/10">
            <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Remaining</p>
            <p id="budget-remaining" class="font-headline text-lg font-bold text-on-surface">₹0</p>
          </div>
          <div class="flex-1 p-4 rounded-xl bg-surface-container-low border border-outline-variant/10">
            <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Avg Daily</p>
            <p id="budget-avg-daily" class="font-headline text-lg font-bold text-on-surface">₹0</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Category Filters ── -->
    <section class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
      <!-- data-filter values match activeFilter state: 'all' | 'me' | 'shared' -->
      <button data-filter="all"    class="px-6 py-2 rounded-full bg-primary text-on-primary font-semibold text-sm whitespace-nowrap transition-transform active:scale-95">All Expenses</button>
      <button data-filter="me"     class="px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm whitespace-nowrap transition-transform active:scale-95">Me Only</button>
      <button data-filter="shared" class="px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm whitespace-nowrap transition-transform active:scale-95">Shared</button>
    </section>

    <!-- ── Recent Activity List ── -->
    <section class="space-y-4">
      <h3 class="font-headline font-bold text-lg text-on-surface px-1">Recent Activity</h3>
      <!-- Populated dynamically by JS -->
      <div id="activity-list" class="space-y-3">
        <!-- Skeleton shown while loading, then replaced with real items -->
      </div>
    </section>

  </main>

  <!-- ── Bottom Nav Bar ── -->
  <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-12px_40px_rgba(23,28,31,0.06)]">
    <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#00327d] dark:hover:text-white transition-all active:scale-90 duration-150" href="navigation_drawer.html">
      <span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
      <span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Trips</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-[#cbe7f5] dark:bg-[#0047ab]/20 text-[#00327d] dark:text-[#cbe7f5] rounded-2xl px-5 py-2 scale-105 active:scale-90 transition-transform duration-150" href="#">
      <span class="material-symbols-outlined mb-1" data-icon="receipt_long" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
      <span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Expenses</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#00327d] dark:hover:text-white transition-all active:scale-90 duration-150" href="#">
      <span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
      <span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Reports</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#00327d] dark:hover:text-white transition-all active:scale-90 duration-150" href="settings.html">
      <span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
      <span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Settings</span>
    </a>
  </nav>

  <!-- ── FAB — Add Expense ── -->
  <button class="fixed bottom-28 right-6 w-14 h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-2xl shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-40"
          aria-label="Add expense">
    <span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
  </button>

</body>
</html>
